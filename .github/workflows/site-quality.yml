name: Site Quality

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate site
        shell: pwsh
        run: ./scripts/validate-site.ps1
